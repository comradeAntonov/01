        $('button').eq(0).click(function(){

        btn[0].onclick = function(){
            console.log(swiper.style.left)
            if(i == 0){
                i -= 3;
                swiper.style.left = i*395.203 + 'px';
            }else if(i >= -3 && i<swiper_item.length){
                i++;
                swiper.style.left = i*395.203 + 'px';
            }
        }
        btn[1].onclick = function(){
            console.log(swiper.style.left)
            if(i < swiper_item.length && i > -3){
                i--;
                console.log(i);
                swiper.style.left = i*395.203 + 'px';
            }else{
                i = 0;
                swiper.style.left = 0;
            }
        }
